        /* ====================== MAIN APP ====================== */
        // Lightweight charts (no external library, so nothing to fail to load)
        function HBar({ data }) {
            const max = Math.max(1, ...data.map(d => d.value));
            if (!data.length) return <p className="text-forest/30 text-sm py-4 text-center">No data yet.</p>;
            return (
                <div className="space-y-3">
                    {data.map((d,i) => (
                        <div key={i}>
                            <div className="flex justify-between text-xs font-semibold text-forest mb-1">
                                <span className="truncate pr-2 flex items-center gap-1.5">{d.icon && <Icon name={d.icon} size={12} />}{d.label}</span>
                                <span className="tnum shrink-0">{eur(d.value)}</span>
                            </div>
                            <div className="h-2.5 bg-parch-dark rounded-full overflow-hidden">
                                <div className="h-full rounded-full transition-all" style={{ width: (d.value/max*100)+'%', background: d.color || '#1f3d2b' }}></div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }
        function Columns({ data }) {
            const max = Math.max(1, ...data.map(d => d.value));
            if (!data.length) return <p className="text-forest/30 text-sm py-4 text-center">No data yet.</p>;
            const H = 130; // max bar height in px (percentage heights collapse without a fixed parent)
            return (
                <div className="flex items-end gap-1.5" style={{ minHeight:(H+34)+'px' }}>
                    {data.map((d,i) => (
                        <div key={i} className="flex-1 flex flex-col items-center justify-end gap-1 min-w-0">
                            <span className="text-[8px] font-bold text-forest/60 tnum">{d.value>0?eur(d.value).replace('.00',''):''}</span>
                            <div className="w-full rounded-t-md bg-forest hover:bg-forest-light transition-colors" style={{ height: Math.max(3, (d.value/max)*H)+'px' }} title={eur(d.value)}></div>
                            <span className="text-[8px] text-forest/50 font-bold truncate w-full text-center">{d.label}</span>
                        </div>
                    ))}
                </div>
            );
        }
        function App() {
            const [tab, setTab] = useState('dashboard');
            const [customers, setCustomers] = useState(() => lsGet(K.customers, []));
            const [readings, setReadings] = useState(() => lsGet(K.readings, []));
            const [scriptUrl, setScriptUrl] = useState(() => lsGet(K.url, ''));
            const [ownerEmail, setOwnerEmail] = useState(() => lsGet(K.owner, ''));
            const [secretKey, setSecretKey] = useState(() => lsGet(K.key, ''));
            // Setup gate: app stays locked until a valid Apps Script URL + access key are saved on this device
            const [authed, setAuthed] = useState(() => !!(lsGet(K.url,'') && lsGet(K.key,'')));
            const [gateUrl, setGateUrl] = useState(() => lsGet(K.url,''));
            const [gateKey, setGateKey] = useState('');
            const [gateEmail, setGateEmail] = useState(() => lsGet(K.owner,''));
            const [gateBusy, setGateBusy] = useState(false);
            const [gateErr, setGateErr] = useState('');
            const [business, setBusiness] = useState(() => lsGet(K.biz, { name:'W.FOREMAN & CO LTD', address:'', vatNo:'', payInfo:'' }));

            const [sync, setSync] = useState('idle'); // idle | syncing | error | offline
            const [toast, setToast] = useState(null);
            const [filter, setFilter] = useState('all');

            // install
            const [canInstall, setCanInstall] = useState(!!window.__bip);
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const [showIosHint, setShowIosHint] = useState(false);

            // modals
            const [mAdd, setMAdd] = useState(false);
            const [mEdit, setMEdit] = useState(false);
            const [mRead, setMRead] = useState(false);
            const [mInv, setMInv] = useState(false);
            const [mDel, setMDel] = useState(false);

            // working state
            const [form, setForm] = useState(blankCustomer());
            const [sel, setSel] = useState(null);          // selected customer
            const [selUtil, setSelUtil] = useState(null);  // selected utility key
            const [prevReading, setPrevReading] = useState(null);
            const [readVal, setReadVal] = useState('');
            const [readDate, setReadDate] = useState(todayISO());
            const [readFrom, setReadFrom] = useState(todayISO());
            const [rateOverride, setRateOverride] = useState(null); // editable cfg snapshot
            const [invoice, setInvoice] = useState(null);
            const [emailing, setEmailing] = useState(false);
            const [editingReadingId, setEditingReadingId] = useState(null);
            const [repCust, setRepCust] = useState('all');
            const [repUtil, setRepUtil] = useState('all');

            const showToast = (message, type='info') => { setToast({ message, type }); setTimeout(()=>setToast(null), 2600); };

            /* persist locally on every change */
            useEffect(() => { lsSet(K.customers, customers); }, [customers]);
            useEffect(() => { lsSet(K.readings, readings); }, [readings]);

            /* install listeners */
            useEffect(() => {
                const onBip = () => setCanInstall(true);
                const onInstalled = () => { setCanInstall(false); showToast('App installed','success'); };
                window.addEventListener('bip-ready', onBip);
                window.addEventListener('app-installed', onInstalled);
                if (window.__bip) setCanInstall(true);
                return () => { window.removeEventListener('bip-ready', onBip); window.removeEventListener('app-installed', onInstalled); };
            }, []);

            /* generate manifest + apple icon at runtime so install works on any host path */
            useEffect(() => {
                try {
                    const dir = location.href.replace(/[^/]*(\?.*)?$/, '');
                    const manifest = {
                        name:'W.FOREMAN & CO LTD', short_name:'Foreman',
                        start_url: dir, scope: dir, display:'standalone',
                        background_color:'#f4eede', theme_color:'#1f3d2b',
                        icons:[
                            { src: ICON512, sizes:'512x512', type:'image/jpeg', purpose:'any' },
                            { src: ICON512, sizes:'512x512', type:'image/jpeg', purpose:'maskable' },
                            { src: ICON180, sizes:'180x180', type:'image/jpeg' }
                        ]
                    };
                    const blobUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type:'application/manifest+json' }));
                    let link = document.querySelector('link[rel="manifest"]');
                    if (!link) { link = document.createElement('link'); link.rel='manifest'; document.head.appendChild(link); }
                    link.href = blobUrl;
                    let apple = document.querySelector('link[rel="apple-touch-icon"]');
                    if (!apple) { apple = document.createElement('link'); apple.rel='apple-touch-icon'; document.head.appendChild(apple); }
                    apple.href = ICON180;
                } catch(e){}

                // show iOS add-to-home hint once
                if (isIOS && !isStandalone && !lsGet(K.iosHint,false)) setShowIosHint(true);
            }, []);

            /* cloud load (stale-while-revalidate) */
            useEffect(() => {
                if (!scriptUrl) { setSync('offline'); return; }
                let cancelled = false;
                setSync('syncing');
                const url = scriptUrl + (scriptUrl.includes('?')?'&':'?') + 'key=' + encodeURIComponent(secretKey||'');
                fetch(url, { method:'GET' })
                    .then(r => r.json())
                    .then(d => {
                        if (cancelled || !d || d.error) { if (d && d.error) setSync('error'); return; }
                        if (Array.isArray(d.customers)) setCustomers(d.customers);
                        if (Array.isArray(d.readings)) setReadings(d.readings);
                        if (d.ownerEmail && !ownerEmail) { setOwnerEmail(d.ownerEmail); lsSet(K.owner, d.ownerEmail); }
                        setSync('idle');
                    })
                    .catch(() => { if (!cancelled) setSync('error'); });
                return () => { cancelled = true; };
            }, [scriptUrl, secretKey]);

            const pushCloud = (nextCustomers, nextReadings) => {
                if (!scriptUrl) return;
                setSync('syncing');
                fetch(scriptUrl, {
                    method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action:'save', key: secretKey||'', data:{ customers: nextCustomers, readings: nextReadings } })
                }).then(() => setSync('idle')).catch(() => { setSync('error'); showToast('Saved on device, cloud sync failed','error'); });
            };
            const commit = (nextCustomers, nextReadings) => {
                setCustomers(nextCustomers); setReadings(nextReadings);
                pushCloud(nextCustomers, nextReadings);
            };

            /* ---------- customer CRUD ---------- */
            const baselineFor = (cust) => {
                const out = [];
                UKEYS.forEach(k => {
                    const cfg = cust.utilities[k];
                    if (cfg.enabled) out.push({
                        id: 'r'+Math.random().toString(36).slice(2), customerId: cust.id, customerName: cust.name,
                        utility:k, reading: num(cfg.initialReading), previousReading: num(cfg.initialReading),
                        usage:0, days:0, baseline:true, items:[], subtotal:0, vatRate:num(cfg.vatRate), vatAmount:0, total:0,
                        periodStart: cust.startDate, periodEnd: cust.startDate, timestamp: cust.startDate + 'T00:00:00.000Z'
                    });
                });
                return out;
            };
            const saveAdd = (e) => {
                e.preventDefault();
                const cust = { ...form, id: Date.now().toString(), createdAt: new Date().toISOString() };
                const nextC = [cust, ...customers];
                const nextR = [...readings, ...baselineFor(cust)];
                commit(nextC, nextR);
                setMAdd(false); setForm(blankCustomer()); showToast('Customer added','success');
            };
            const saveEdit = (e) => {
                e.preventDefault();
                const nextC = customers.map(c => c.id===sel.id ? { ...form, id:c.id, createdAt:c.createdAt } : c);
                const nextR = readings.map(r => r.customerId===sel.id ? { ...r, customerName: form.name } : r);
                commit(nextC, nextR);
                setMEdit(false); showToast('Customer updated','success');
            };
            const doDelete = () => {
                const nextC = customers.filter(c => c.id!==sel.id);
                const nextR = readings.filter(r => r.customerId!==sel.id);
                commit(nextC, nextR);
                setMDel(false); setMEdit(false); showToast('Customer removed','info');
            };

            /* ---------- readings ---------- */
            const openReading = (cust, key) => {
                const prior = readings.filter(r => r.customerId===cust.id && r.utility===key)
                                      .sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp))[0] || null;
                setEditingReadingId(null);
                setSel(cust); setSelUtil(key); setPrevReading(prior);
                setReadVal(''); setReadDate(todayISO());
                setReadFrom((prior ? prior.timestamp : (cust.startDate || todayISO())).slice(0,10));
                setRateOverride({ ...cust.utilities[key] }); // editable snapshot for mid-period price changes
                setMRead(true);
            };
            const openEditReading = (rec) => {
                const cust = customers.find(c => c.id===rec.customerId);
                if (!cust) return;
                setEditingReadingId(rec.id);
                setSel(cust); setSelUtil(rec.utility);
                setPrevReading({ reading: rec.previousReading, timestamp: rec.periodStart });
                setReadVal(String(rec.reading));
                setReadFrom((rec.periodStart || rec.timestamp).slice(0,10));
                setReadDate((rec.periodEnd || rec.timestamp).slice(0,10));
                setRateOverride({ ...(cust.utilities[rec.utility]||{}), ...(rec.rateSnapshot||{}) });
                setMInv(false); setMRead(true);
            };
            const deleteReading = () => {
                if (!editingReadingId) return;
                if (!window.confirm('Delete this bill permanently?')) return;
                commit(customers, readings.filter(r => r.id!==editingReadingId));
                setMRead(false); setEditingReadingId(null); setMInv(false);
                showToast('Bill deleted','info');
            };
            const livePreview = useMemo(() => {
                if (!mRead || !selUtil || !rateOverride) return null;
                const prevVal = prevReading ? prevReading.reading : 0;
                const cur = num(readVal);
                const usage = cur - prevVal;
                const days = daysBetween(readFrom, readDate);
                const bill = computeBill(selUtil, rateOverride, usage<0?0:usage, days);
                return { prevVal, prevTs: readFrom, cur, usage, days, ...bill };
            }, [mRead, selUtil, rateOverride, readVal, readDate, readFrom, prevReading, sel]);

            const saveReading = (e) => {
                e.preventDefault();
                if (!livePreview) return;
                if (isNaN(num(readVal)) || readVal==='') return showToast('Enter a valid reading','error');
                if (livePreview.usage < 0) return showToast('Reading is lower than the previous one','error');
                const fields = {
                    customerId: sel.id, customerName: sel.name, utility: selUtil,
                    reading: livePreview.cur, previousReading: livePreview.prevVal, usage: livePreview.usage,
                    days: livePreview.days, items: livePreview.items, subtotal: livePreview.subtotal,
                    vatRate: livePreview.vatRate, vatAmount: livePreview.vatAmount, total: livePreview.total,
                    rateSnapshot: { ...rateOverride },
                    periodStart: readFrom + 'T00:00:00.000Z', periodEnd: readDate + 'T00:00:00.000Z',
                    timestamp: readDate + 'T00:00:00.000Z'
                };
                if (editingReadingId) {
                    const nextR = readings.map(r => r.id===editingReadingId ? { ...r, ...fields } : r);
                    commit(customers, nextR);
                    setMRead(false); setEditingReadingId(null); showToast('Invoice updated','success');
                    openInvoice(nextR.find(r => r.id===editingReadingId));
                    return;
                }
                const rec = { ...fields, id: Date.now().toString(), status:'logged' };
                commit(customers, [rec, ...readings]);
                setMRead(false); showToast('Reading saved','success');
                openInvoice(rec);
            };

            /* ---------- invoice ---------- */
            const openInvoice = (rec) => {
                const cust = customers.find(c => c.id===rec.customerId) || sel;
                if (!cust) return;
                setInvoice({
                    ...rec, customer: cust,
                    invoiceNo: rec.invoiceNo || ('WF-' + (rec.id||Date.now().toString()).slice(-6))
                });
                setMInv(true);
            };
            const markStatus = (status) => {
                if (!invoice) return;
                const nextR = readings.map(r => r.id===invoice.id ? { ...r, status, invoiceNo: invoice.invoiceNo } : r);
                commit(customers, nextR);
            };
            const togglePaid = () => {
                if (!invoice) return;
                const np = !invoice.paid;
                commit(customers, readings.map(r => r.id===invoice.id ? { ...r, paid: np } : r));
                setInvoice({ ...invoice, paid: np });
                showToast(np ? 'Marked paid' : 'Marked unpaid', np ? 'success' : 'info');
            };

            const invFilename = () => `Invoice_${(invoice.customer.billedEntity||invoice.customer.name||'Customer').replace(/[^a-z0-9]/gi,'_')}_${invoice.utility}.pdf`;

            // Self-contained, inline-styled invoice used for printing and for the emailed PDF.
            const buildInvoiceHTML = (d, biz) => {
                const u = UTILS[d.utility];
                const ref = d.customer.utilities[d.utility][u.refKey];
                const rows = d.items.map(it => (
                    '<tr><td style="padding:7px 0;border-bottom:1px solid #e9e0c9;">'
                    + '<div style="font-weight:600;color:#1f3d2b;">'+it.label+'</div>'
                    + '<div style="font-size:11px;color:#8a8576;">'+it.qty.toFixed(it.unit==='days'?0:2)+' '+it.unit+' @ '+eur(it.rate)+(it.note?'  ('+it.note+')':'')+'</div></td>'
                    + '<td style="padding:7px 0;border-bottom:1px solid #e9e0c9;text-align:right;font-weight:700;color:#1f3d2b;white-space:nowrap;">'+eur(it.amount)+'</td></tr>'
                )).join('');
                return '<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+d.invoiceNo+'</title>'
                + '<style>@page{margin:14mm} body{font-family:Arial,Helvetica,sans-serif;color:#2a2620;margin:0;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}</style></head><body>'
                + '<div style="max-width:720px;margin:0 auto;">'
                + '<table style="width:100%;border-collapse:collapse;border-bottom:4px solid #b08d4c;"><tr>'
                + '<td style="padding:16px 6px;vertical-align:middle;"><img src="'+LOGO+'" width="58" height="58" style="vertical-align:middle;display:inline-block;">'
                + '<span style="display:inline-block;vertical-align:middle;margin-left:12px;"><span style="font-size:21px;font-weight:800;color:#1f3d2b;">'+biz.name+'</span><br>'
                + '<span style="font-size:10px;letter-spacing:2px;color:#8a6d34;text-transform:uppercase;">Tradition &middot; Integrity &middot; Service</span>'
                + (biz.address?'<br><span style="font-size:11px;color:#6b6658;">'+biz.address+'</span>':'')+'</span></td>'
                + '<td style="padding:16px 6px;text-align:right;vertical-align:top;"><div style="font-size:9px;letter-spacing:2px;color:#9a9486;text-transform:uppercase;">Invoice</div>'
                + '<div style="font-weight:700;color:#1f3d2b;">'+d.invoiceNo+'</div><div style="font-size:11px;color:#6b6658;">Issued '+fmtDate(d.periodEnd)+'</div></td></tr></table>'
                + '<div style="padding:16px 6px;"><table style="width:100%;border-collapse:collapse;"><tr>'
                + '<td style="vertical-align:top;"><div style="font-size:9px;letter-spacing:2px;color:#8a6d34;text-transform:uppercase;">Recharge To</div>'
                + '<div style="font-size:16px;font-weight:700;color:#1f3d2b;">'+(d.customer.billedEntity||d.customer.name)+'</div>'
                + (d.customer.billedEntity&&d.customer.name&&d.customer.name!==d.customer.billedEntity?'<div style="font-size:13px;color:#4a463c;">'+d.customer.name+'</div>':'')
                + '<div style="font-size:13px;color:#4a463c;">'+(d.customer.address||'')+'</div>'
                + (d.customer.site?'<div style="font-size:11px;color:#8a8576;">Site: '+d.customer.site+'</div>':'')+'</td>'
                + '<td style="vertical-align:top;text-align:right;font-size:12px;color:#4a463c;"><div><b>'+u.label+'</b> &middot; Metered</div>'
                + (ref?'<div>'+u.refLabel+': '+ref+'</div>':'')
                + '<div>VAT Rate: '+d.vatRate+'%'+(d.vatRate===0?' (Exempt)':'')+'</div>'
                + '<div>Period: '+fmtDate(d.periodStart)+' to '+fmtDate(d.periodEnd)+'</div><div>Days: '+d.days+'</div></td></tr></table>'
                + '<table style="width:100%;border-collapse:collapse;background:#1f3d2b;color:#f4eede;margin:14px 0;border-radius:8px;"><tr>'
                + '<td style="padding:11px;text-align:center;"><div style="font-size:9px;color:#cdbf9a;text-transform:uppercase;">Meter</div><div style="font-weight:700;">'+(d.customer.utilities[d.utility].meterNo||'N/A')+'</div></td>'
                + '<td style="padding:11px;text-align:center;"><div style="font-size:9px;color:#cdbf9a;text-transform:uppercase;">Previous</div><div style="font-weight:700;">'+d.previousReading.toFixed(2)+'</div></td>'
                + '<td style="padding:11px;text-align:center;"><div style="font-size:9px;color:#d8bd86;text-transform:uppercase;">Current</div><div style="font-weight:700;color:#d8bd86;">'+d.reading.toFixed(2)+'</div></td>'
                + '<td style="padding:11px;text-align:center;"><div style="font-size:9px;color:#cdbf9a;text-transform:uppercase;">Used</div><div style="font-weight:700;">'+d.usage.toFixed(2)+' '+u.vol+'</div></td></tr></table>'
                + '<div style="font-size:9px;letter-spacing:2px;color:#8a6d34;text-transform:uppercase;margin-bottom:2px;">Charges</div>'
                + '<table style="width:100%;border-collapse:collapse;font-size:14px;">'+rows+'</table>'
                + '<table style="width:100%;border-collapse:collapse;font-size:14px;margin-top:8px;">'
                + '<tr><td style="padding:3px 0;color:#4a463c;">Subtotal (excl. VAT)</td><td style="padding:3px 0;text-align:right;font-weight:700;">'+eur(d.subtotal)+'</td></tr>'
                + (d.vatAmount>0?'<tr><td style="padding:3px 0;color:#4a463c;">VAT @ '+d.vatRate+'%</td><td style="padding:3px 0;text-align:right;font-weight:700;">'+eur(d.vatAmount)+'</td></tr>':'')
                + '<tr><td style="padding:10px 0 0;border-top:2px solid #1f3d2b;font-size:18px;font-weight:800;color:#1f3d2b;">Total Due</td>'
                + '<td style="padding:10px 0 0;border-top:2px solid #1f3d2b;text-align:right;font-size:23px;font-weight:800;color:#8a6d34;">'+eur(d.total)+'</td></tr></table>'
                + (biz.payInfo?'<div style="margin-top:14px;padding:10px;background:#f4eede;border:1px solid #e9e0c9;border-radius:8px;font-size:12px;color:#4a463c;white-space:pre-line;"><b>Payment</b><br>'+biz.payInfo+'</div>':'')
                + '</div><table style="width:100%;border-collapse:collapse;border-top:1px solid #e9e0c9;"><tr>'
                + '<td style="padding:9px 6px;font-size:9px;letter-spacing:2px;color:#9a9486;text-transform:uppercase;">'+biz.name+(biz.vatNo?' &middot; VAT '+biz.vatNo:'')+'</td>'
                + '<td style="padding:9px 6px;text-align:right;font-size:9px;letter-spacing:2px;color:#b4ae9e;text-transform:uppercase;">Tradition &middot; Integrity &middot; Service</td></tr></table>'
                + '</div></body></html>';
            };

            // Native print -> the browser handles "Save as PDF" / share. No html2canvas, never freezes.
            const printInvoice = () => {
                if (!invoice) return;
                markStatus('invoiced');
                const html = buildInvoiceHTML(invoice, business);
                const w = window.open('', '_blank');
                if (!w) { showToast('Allow pop-ups to print or save as PDF','error'); return; }
                w.document.open(); w.document.write(html); w.document.close();
                setTimeout(() => { try { w.focus(); w.print(); } catch(e){} }, 500);
            };

            const emailToSelf = async () => {
                const to = ownerEmail || lsGet(K.owner,'');
                if (!scriptUrl) return showToast('Connect Apps Script in Settings to email','error');
                if (!to) return showToast('Set your email in Settings first','error');
                setEmailing(true);
                try {
                    await fetch(scriptUrl, {
                        method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            action:'email', to, key: secretKey||'',
                            subject:`Invoice ${invoice.invoiceNo} - ${invoice.customer.billedEntity||invoice.customer.name} - ${cap(invoice.utility)}`,
                            html: buildInvoiceHTML(invoice, business),
                            filename: invFilename()
                        })
                    });
                    markStatus('sent'); showToast('Emailed to ' + to, 'success');
                } catch(err) { showToast('Email failed, check connection','error'); }
                setEmailing(false);
            };

            const doInstall = async () => {
                if (window.__bip) { window.__bip.prompt(); try { await window.__bip.userChoice; } catch(e){} window.__bip=null; setCanInstall(false); }
                else if (isIOS) { setShowIosHint(true); }
                else { showToast('Use your browser menu to Install / Add to Home Screen','info'); }
            };

            /* ---------- derived ---------- */
            const billable = useMemo(() => readings.filter(r => !r.baseline), [readings]);
            const stats = useMemo(() => {
                let rs = billable;
                if (filter!=='all') rs = rs.filter(r => r.utility===filter);
                return {
                    total: rs.reduce((a,r)=>a+num(r.total),0),
                    usage: rs.reduce((a,r)=>a+num(r.usage),0),
                    count: rs.length
                };
            }, [billable, filter]);

            const syncMeta = {
                idle:{ dot:'bg-emerald-500', label:'Synced', icon:'cloud' },
                syncing:{ dot:'bg-gold animate-pulse', label:'Syncing...', icon:'cloud' },
                error:{ dot:'bg-red-500', label:'Sync error', icon:'cloudOff' },
                offline:{ dot:'bg-forest/30', label:'On device', icon:'cloudOff' }
            }[sync];

            const NAV = [
                { id:'dashboard', label:'Overview', icon:'gauge' },
                { id:'customers', label:'Customers', icon:'users' },
                { id:'billing', label:'Billing', icon:'receipt' },
                { id:'reports', label:'Reports', icon:'chart' },
                { id:'settings', label:'Settings', icon:'settings' }
            ];

            // Verify the URL + key against the server, then save on this device and unlock
            const doConnect = async () => {
                const u = gateUrl.trim(), k = gateKey.trim();
                if (!u || !k) { setGateErr('Enter the Apps Script URL and your access key.'); return; }
                setGateBusy(true); setGateErr('');
                try {
                    const res = await fetch(u + (u.includes('?')?'&':'?') + 'key=' + encodeURIComponent(k));
                    const d = await res.json();
                    if (!d || d.error) {
                        setGateErr(d && d.error==='unauthorised' ? 'Wrong access key for this database.' : 'Could not connect. Check the URL is the /exec link.');
                        setGateBusy(false); return;
                    }
                    lsSet(K.url, u); lsSet(K.key, k); if (gateEmail.trim()) lsSet(K.owner, gateEmail.trim());
                    setScriptUrl(u); setSecretKey(k); if (gateEmail.trim()) setOwnerEmail(gateEmail.trim());
                    if (Array.isArray(d.customers)) setCustomers(d.customers);
                    if (Array.isArray(d.readings)) setReadings(d.readings);
                    setSync('idle'); setAuthed(true);
                } catch(e) {
                    setGateErr('Network error. You need to be online for first-time setup.');
                    setGateBusy(false);
                }
            };
            const lockApp = () => {
                localStorage.removeItem(K.url); localStorage.removeItem(K.key);
                setScriptUrl(''); setSecretKey(''); setGateKey(''); setAuthed(false);
            };

            if (!authed) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6">
                        <div className="w-full max-w-sm animate-in">
                            <div className="flex flex-col items-center text-center mb-7">
                                <img src={LOGO} alt="" className="w-20 h-20 mb-4" />
                                <h1 className="font-serif text-2xl font-black text-forest">W.FOREMAN &amp; CO LTD</h1>
                                <p className="text-[10px] font-extrabold uppercase tracking-[0.2em] text-gold-dark mt-1">Utility Management</p>
                            </div>
                            <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5 space-y-4 shadow-lg">
                                <div className="flex items-center gap-2 text-forest"><Icon name="link" size={18} className="text-gold-dark" /><h2 className="font-serif text-lg font-bold">Connect Database</h2></div>
                                <Field label="Apps Script URL">
                                    <input className={inputCls+" text-sm font-mono"} placeholder="https://script.google.com/macros/s/.../exec" value={gateUrl} onChange={e=>setGateUrl(e.target.value)} />
                                </Field>
                                <Field label="Access Key" hint="the SECRET set in your Apps Script">
                                    <input type="password" className={inputCls+" text-sm font-mono"} placeholder="your password" value={gateKey} onChange={e=>setGateKey(e.target.value)} onKeyDown={e=>{ if(e.key==='Enter') doConnect(); }} />
                                </Field>
                                <Field label="Your email" hint="invoices are sent here">
                                    <input className={inputCls+" text-sm"} placeholder="you@example.com" value={gateEmail} onChange={e=>setGateEmail(e.target.value)} />
                                </Field>
                                {gateErr && <p className="text-sm font-semibold text-red-700 bg-red-50 border border-red-200 rounded-xl p-3 flex items-center gap-2"><Icon name="alert" size={16} />{gateErr}</p>}
                                <Button className="w-full py-4" icon={gateBusy?undefined:"check"} disabled={gateBusy} onClick={doConnect}>{gateBusy?'Checking...':'Unlock App'}</Button>
                                <p className="text-[11px] text-forest/50 text-center">Saved securely on this device, so you will not be asked again on this phone.</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-28 sm:pb-10">
                    {/* toast */}
                    {toast && (
                        <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[120] px-5 py-3 rounded-full text-white shadow-xl flex items-center gap-2.5 animate-in ${toast.type==='error'?'bg-red-700':(toast.type==='success'?'bg-emerald-700':'bg-forest')}`}>
                            <Icon name={toast.type==='error'?'alert':'check'} size={16} /><span className="font-semibold text-sm whitespace-nowrap">{toast.message}</span>
                        </div>
                    )}

                    {/* header */}
                    <header className="bg-forest text-parch-card sticky top-0 z-50 border-b-4 border-gold">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
                            <div className="flex items-center gap-3 min-w-0">
                                <img src={LOGO} alt="" className="w-11 h-11 shrink-0" />
                                <div className="min-w-0">
                                    <h1 className="font-serif text-lg sm:text-xl font-black tracking-tight truncate leading-none">W.FOREMAN &amp; CO</h1>
                                    <div className="flex items-center gap-1.5 mt-1">
                                        <span className={`w-2 h-2 rounded-full ${syncMeta.dot}`}></span>
                                        <span className="text-[9px] font-bold uppercase tracking-[0.15em] text-parch/60">{syncMeta.label}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {canInstall && !isStandalone && (
                                    <button onClick={doInstall} className="hidden sm:flex items-center gap-2 px-3 py-2 rounded-xl bg-gold text-white font-bold text-sm active:scale-95"><Icon name="smartphone" size={16} />Install</button>
                                )}
                                <button onClick={()=>{ setForm(blankCustomer()); setMAdd(true); }} className="flex items-center gap-2 px-3 sm:px-4 py-2 rounded-xl bg-gold text-white font-bold text-sm active:scale-95 shadow"><Icon name="plus" size={18} /><span className="hidden sm:inline">Add Customer</span></button>
                            </div>
                        </div>
                    </header>

                    {/* iOS install hint */}
                    {showIosHint && !isStandalone && (
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 pt-3">
                            <div className="bg-forest text-parch-card rounded-2xl p-4 flex items-start gap-3 animate-in">
                                <div className="p-2 bg-gold rounded-xl shrink-0"><Icon name="smartphone" size={18} className="text-white" /></div>
                                <div className="flex-1 text-sm">
                                    <p className="font-bold mb-0.5">Install on your iPhone</p>
                                    <p className="text-parch/70 text-xs">Tap the Share button in Safari, then choose <b>Add to Home Screen</b>. It then opens like a normal app.</p>
                                </div>
                                <button onClick={()=>{ setShowIosHint(false); lsSet(K.iosHint,true); }} className="p-1.5 hover:bg-white/15 rounded-lg shrink-0"><Icon name="x" size={16} /></button>
                            </div>
                        </div>
                    )}

                    <main className="max-w-5xl mx-auto px-4 sm:px-6 py-5 space-y-5 animate-in">
                        {/* desktop tabs */}
                        <div className="hidden sm:flex bg-parch-dark/50 p-1.5 rounded-2xl w-fit">
                            {NAV.map(t => (
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl text-xs font-extrabold uppercase tracking-wider transition-all ${tab===t.id?'bg-forest text-gold-soft shadow':'text-forest/50 hover:text-forest'}`}>
                                    <Icon name={t.icon} size={15} />{t.label}
                                </button>
                            ))}
                        </div>

                        {/* ===== DASHBOARD ===== */}
                        {tab==='dashboard' && (
                            <div className="space-y-5">
                                <div className="flex overflow-x-auto gap-2 pb-1 scrollbar-hide">
                                    {['all',...UKEYS].map(u => (
                                        <button key={u} onClick={()=>setFilter(u)} className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider border-2 whitespace-nowrap transition-all ${filter===u?'bg-forest text-parch-card border-forest':'bg-parch-card text-forest/60 border-parch-dark'}`}>{u}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
                                    <div className="col-span-2 bg-forest text-parch-card rounded-3xl p-6 relative overflow-hidden">
                                        <Icon name="euro" size={120} className="absolute -bottom-6 -right-4 opacity-[0.08]" />
                                        <p className="text-[10px] font-extrabold uppercase tracking-[0.18em] text-gold-soft mb-1">Total Recharged</p>
                                        <h3 className="font-serif text-4xl sm:text-5xl font-black tnum">{eur(stats.total)}</h3>
                                    </div>
                                    <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5">
                                        <p className="text-[10px] font-extrabold uppercase tracking-[0.15em] text-forest/50 mb-1">Consumption</p>
                                        <h3 className="font-serif text-3xl font-black text-forest tnum">{stats.usage.toFixed(1)}</h3>
                                    </div>
                                    <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5">
                                        <p className="text-[10px] font-extrabold uppercase tracking-[0.15em] text-forest/50 mb-1">Customers</p>
                                        <h3 className="font-serif text-3xl font-black text-forest tnum">{customers.length}</h3>
                                    </div>
                                </div>

                                <div className="bg-parch-card border-2 border-parch-dark rounded-3xl overflow-hidden">
                                    <div className="px-5 py-4 border-b border-parch-dark bg-parch flex items-center justify-between">
                                        <h2 className="font-serif text-lg font-bold text-forest">Recent Bills</h2>
                                        {billable.length>0 && <button onClick={()=>setTab('billing')} className="text-xs font-bold text-gold-dark uppercase tracking-wide">View all</button>}
                                    </div>
                                    {billable.length===0 ? (
                                        <div className="p-10 text-center text-forest/40 text-sm">No bills yet. Add a customer, then log a meter reading.</div>
                                    ) : billable.slice(0,5).map(r => (
                                        <button key={r.id} onClick={()=>openInvoice(r)} className="w-full px-5 py-4 flex items-center justify-between hover:bg-parch transition-colors border-b border-parch-dark/50 last:border-0 text-left">
                                            <div className="flex items-center gap-3 min-w-0">
                                                <div className="w-10 h-10 rounded-xl bg-forest text-gold-soft flex items-center justify-center shrink-0"><Icon name={UTILS[r.utility].icon} size={18} /></div>
                                                <div className="min-w-0"><p className="font-bold text-forest truncate">{r.customerName}</p><p className="text-[10px] uppercase tracking-wider text-forest/40 font-bold">{r.utility} &middot; {r.usage.toFixed(1)} {UTILS[r.utility].vol} &middot; {fmtDate(r.periodEnd)}</p></div>
                                            </div>
                                            <span className="font-serif text-xl font-black text-forest tnum shrink-0">{eur(r.total)}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ===== CUSTOMERS ===== */}
                        {tab==='customers' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                {customers.length===0 ? (
                                    <div className="col-span-full py-16 text-center bg-parch-card border-2 border-dashed border-parch-dark rounded-3xl">
                                        <Icon name="users" size={44} className="mx-auto text-forest/25 mb-3" />
                                        <h3 className="font-serif text-xl font-bold text-forest mb-1">No customers yet</h3>
                                        <p className="text-forest/50 text-sm mb-5">Each tenant that you recharge gets their own profile and meters.</p>
                                        <Button icon="plus" className="mx-auto" onClick={()=>{ setForm(blankCustomer()); setMAdd(true); }}>Add Customer</Button>
                                    </div>
                                ) : customers.map(c => (
                                    <div key={c.id} className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="min-w-0 pr-3">
                                                <h3 className="font-serif text-xl font-black text-forest truncate">{c.name}</h3>
                                                <div className="flex flex-wrap gap-x-3 gap-y-0.5 text-[11px] font-semibold text-forest/50 mt-0.5">
                                                    {c.billedEntity && <span className="flex items-center gap-1"><Icon name="user" size={11} />{c.billedEntity}</span>}
                                                    {c.site && <span className="flex items-center gap-1"><Icon name="building" size={11} />{c.site}</span>}
                                                </div>
                                                {c.address && <p className="text-[11px] text-forest/40 mt-0.5 flex items-center gap-1"><Icon name="pin" size={11} />{c.address}</p>}
                                            </div>
                                            <button onClick={()=>{ setSel(c); setForm({ ...blankCustomer(), ...c, utilities:{ ...blankUtils(), ...c.utilities } }); setMEdit(true); }} className="w-9 h-9 rounded-xl bg-parch flex items-center justify-center text-forest/50 hover:text-forest shrink-0"><Icon name="pencil" size={16} /></button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            {UKEYS.filter(k => c.utilities[k] && c.utilities[k].enabled).map(k => {
                                                const last = readings.filter(r => r.customerId===c.id && r.utility===k && !r.baseline).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
                                                return (
                                                    <button key={k} onClick={()=>openReading(c,k)} className="p-3 bg-parch border-2 border-parch-dark rounded-2xl text-left hover:border-gold transition-all flex items-center justify-between group">
                                                        <div className="flex items-center gap-2.5 min-w-0">
                                                            <div className="p-1.5 bg-forest rounded-lg text-gold-soft shrink-0"><Icon name={UTILS[k].icon} size={15} /></div>
                                                            <div className="min-w-0">
                                                                <p className="text-[9px] font-extrabold uppercase tracking-widest text-forest/40">{UTILS[k].label}</p>
                                                                <p className="text-xs font-bold text-forest truncate">{last?('Last '+eur(last.total)):'Take reading'}</p>
                                                            </div>
                                                        </div>
                                                        <Icon name="chevR" size={15} className="text-forest/25 group-hover:text-gold" />
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ===== BILLING ===== */}
                        {tab==='billing' && (
                            <div className="bg-parch-card border-2 border-parch-dark rounded-3xl overflow-hidden">
                                <div className="px-5 py-4 border-b border-parch-dark bg-parch"><h2 className="font-serif text-lg font-bold text-forest">Billing Register</h2><p className="text-xs text-forest/50">Tap a bill to open, email, share or download the invoice.</p></div>
                                {billable.length===0 ? (
                                    <div className="p-10 text-center text-forest/40 text-sm">No readings logged yet.</div>
                                ) : billable.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(r => (
                                    <button key={r.id} onClick={()=>openInvoice(r)} className="w-full px-5 py-4 flex items-center justify-between hover:bg-parch transition-colors border-b border-parch-dark/50 last:border-0 text-left">
                                        <div className="flex items-center gap-3 min-w-0">
                                            <div className="w-11 h-11 rounded-xl bg-forest text-gold-soft flex items-center justify-center shrink-0"><Icon name={UTILS[r.utility].icon} size={20} /></div>
                                            <div className="min-w-0">
                                                <p className="font-bold text-forest truncate">{r.customerName}</p>
                                                <p className="text-[10px] uppercase tracking-wider text-forest/40 font-bold">{r.utility} &middot; {fmtDate(r.periodStart)} to {fmtDate(r.periodEnd)}</p>
                                            </div>
                                        </div>
                                        <div className="text-right shrink-0">
                                            <p className="font-serif text-xl font-black text-forest tnum">{eur(r.total)}</p>
                                            {r.paid ? <span className="text-[9px] font-extrabold uppercase tracking-wider text-emerald-700">Paid</span>
                                                : (r.status && r.status!=='logged' && <span className="text-[9px] font-extrabold uppercase tracking-wider text-gold-dark">{r.status}</span>)}
                                        </div>
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* ===== REPORTS ===== */}
                        {tab==='reports' && (
                            <div className="space-y-4">
                                {customers.length===0 ? (
                                    <div className="py-16 text-center bg-parch-card border-2 border-dashed border-parch-dark rounded-3xl text-forest/40 text-sm">Add customers to see reports.</div>
                                ) : (() => {
                                    const bills = billable.filter(r => (repCust==='all' || r.customerId===repCust) && (repUtil==='all' || r.utility===repUtil));
                                    const billed = bills.reduce((a,r)=>a+num(r.total),0);
                                    const paid = bills.filter(r=>r.paid).reduce((a,r)=>a+num(r.total),0);
                                    const outstanding = billed - paid;

                                    // by customer (when All) or by utility (when one customer chosen)
                                    const byCustomer = customers.map(c => ({
                                        label: c.name, value: bills.filter(r=>r.customerId===c.id).reduce((a,r)=>a+num(r.total),0)
                                    })).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
                                    const byUtility = UKEYS.map(k => ({
                                        label: UTILS[k].label, icon: UTILS[k].icon, color: UCOLOR[k],
                                        value: bills.filter(r=>r.utility===k).reduce((a,r)=>a+num(r.total),0)
                                    })).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);

                                    // monthly trend (last 8 months that have data, chronological)
                                    const mMap = {};
                                    bills.forEach(r => { const d=new Date(r.periodEnd); const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); mMap[key]=(mMap[key]||0)+num(r.total); });
                                    const byMonth = Object.keys(mMap).sort().slice(-8).map(k => {
                                        const [y,m]=k.split('-'); return { label: new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'short'}), value: mMap[k] };
                                    });

                                    return (
                                        <>
                                            {/* Filters */}
                                            <div className="flex flex-col sm:flex-row gap-2">
                                                <select value={repCust} onChange={e=>setRepCust(e.target.value)} className="p-3 bg-parch-card border-2 border-parch-dark rounded-xl font-bold text-forest text-sm outline-none focus:border-gold">
                                                    <option value="all">All customers</option>
                                                    {customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                                </select>
                                                <div className="flex gap-2 overflow-x-auto scrollbar-hide">
                                                    {['all',...UKEYS].map(u => (
                                                        <button key={u} onClick={()=>setRepUtil(u)} className={`px-3.5 py-2 rounded-xl text-xs font-bold uppercase tracking-wider border-2 whitespace-nowrap ${repUtil===u?'bg-forest text-parch-card border-forest':'bg-parch-card text-forest/60 border-parch-dark'}`}>{u}</button>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Summary */}
                                            <div className="grid grid-cols-3 gap-3">
                                                <div className="bg-forest text-parch-card rounded-2xl p-4"><p className="text-[9px] font-extrabold uppercase tracking-widest text-gold-soft mb-1">Billed</p><p className="font-serif text-xl sm:text-2xl font-black tnum">{eur(billed)}</p></div>
                                                <div className="bg-parch-card border-2 border-parch-dark rounded-2xl p-4"><p className="text-[9px] font-extrabold uppercase tracking-widest text-emerald-700 mb-1">Paid</p><p className="font-serif text-xl sm:text-2xl font-black text-emerald-700 tnum">{eur(paid)}</p></div>
                                                <div className="bg-parch-card border-2 border-parch-dark rounded-2xl p-4"><p className="text-[9px] font-extrabold uppercase tracking-widest text-red-700 mb-1">Outstanding</p><p className="font-serif text-xl sm:text-2xl font-black text-red-700 tnum">{eur(outstanding)}</p></div>
                                            </div>

                                            {/* Monthly trend */}
                                            <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5">
                                                <h2 className="font-serif text-base font-bold text-forest mb-3">Monthly Recharge</h2>
                                                <Columns data={byMonth} />
                                            </div>

                                            {/* Breakdown */}
                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                                <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5">
                                                    <h2 className="font-serif text-base font-bold text-forest mb-4">{repCust==='all'?'By Customer':'By Utility'}</h2>
                                                    <HBar data={repCust==='all'?byCustomer:byUtility} />
                                                </div>
                                                <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5">
                                                    <h2 className="font-serif text-base font-bold text-forest mb-4">By Utility</h2>
                                                    <HBar data={byUtility} />
                                                </div>
                                            </div>

                                            {/* Bills list (tap to edit) */}
                                            <div className="bg-parch-card border-2 border-parch-dark rounded-3xl overflow-hidden">
                                                <div className="px-5 py-3 bg-parch border-b border-parch-dark flex justify-between items-center"><h2 className="font-serif text-base font-bold text-forest">Bills</h2><span className="text-xs font-bold text-forest/50">{bills.length}</span></div>
                                                {bills.length===0 ? <p className="p-6 text-center text-forest/30 text-sm">No bills for this filter.</p> :
                                                    bills.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(r => (
                                                        <button key={r.id} onClick={()=>openInvoice(r)} className="w-full px-5 py-3 flex items-center justify-between hover:bg-parch border-b border-parch-dark/50 last:border-0 text-left">
                                                            <div className="flex items-center gap-2.5 min-w-0">
                                                                <Icon name={UTILS[r.utility].icon} size={15} className="text-forest/60 shrink-0" />
                                                                <div className="min-w-0"><p className="font-bold text-forest text-sm truncate">{r.customerName}</p><p className="text-[9px] uppercase tracking-wider text-forest/40 font-bold">{fmtDate(r.periodEnd)}</p></div>
                                                            </div>
                                                            <div className="flex items-center gap-2 shrink-0">
                                                                {r.paid && <span className="text-[8px] font-extrabold uppercase tracking-wider text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded">Paid</span>}
                                                                <span className="font-bold text-forest tnum text-sm">{eur(r.total)}</span>
                                                            </div>
                                                        </button>
                                                    ))}
                                            </div>
                                        </>
                                    );
                                })()}
                            </div>
                        )}

                        {/* ===== SETTINGS ===== */}
                        {tab==='settings' && (
                            <div className="space-y-4 max-w-2xl">
                                <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5 space-y-4">
                                    <div className="flex items-center gap-2"><Icon name="link" size={18} className="text-gold-dark" /><h2 className="font-serif text-lg font-bold text-forest">Cloud Database</h2></div>
                                    <p className="text-xs text-forest/60 -mt-2">Paste the Apps Script Web App URL (ends in /exec). Without it the app still works fully on this device.</p>
                                    <Field label="Apps Script URL">
                                        <input className={inputCls+" text-sm font-mono"} placeholder="https://script.google.com/macros/s/.../exec" value={scriptUrl} onChange={e=>setScriptUrl(e.target.value)} />
                                    </Field>
                                    <Field label="Your email (invoices are sent here)">
                                        <input className={inputCls+" text-sm"} placeholder="you@example.com" value={ownerEmail} onChange={e=>setOwnerEmail(e.target.value)} />
                                    </Field>
                                    <Field label="Access key" hint="must match the SECRET in your Apps Script">
                                        <input className={inputCls+" text-sm font-mono"} placeholder="a private password you choose" value={secretKey} onChange={e=>setSecretKey(e.target.value)} />
                                    </Field>
                                    <Button icon="check" onClick={()=>{ lsSet(K.url, scriptUrl.trim()); lsSet(K.owner, ownerEmail.trim()); lsSet(K.key, secretKey.trim()); setScriptUrl(scriptUrl.trim()); setSecretKey(secretKey.trim()); showToast('Saved and connecting','success'); }}>Save &amp; Connect</Button>
                                    <button onClick={lockApp} className="w-full py-2.5 text-forest/60 font-bold text-sm flex items-center justify-center gap-2 hover:bg-parch rounded-xl transition-colors"><Icon name="cloudOff" size={16} />Lock app (clear saved login on this device)</button>
                                </div>

                                <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5 space-y-4">
                                    <h2 className="font-serif text-lg font-bold text-forest">Business Details (on invoices)</h2>
                                    <Field label="Business Name"><input className={inputCls} value={business.name} onChange={e=>setBusiness({...business,name:e.target.value})} /></Field>
                                    <Field label="Address"><input className={inputCls} value={business.address} onChange={e=>setBusiness({...business,address:e.target.value})} /></Field>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        <Field label="VAT Number"><input className={inputCls} value={business.vatNo} onChange={e=>setBusiness({...business,vatNo:e.target.value})} /></Field>
                                    </div>
                                    <Field label="Payment Details (IBAN, terms)"><textarea rows="2" className={inputCls} value={business.payInfo} onChange={e=>setBusiness({...business,payInfo:e.target.value})} /></Field>
                                    <Button variant="outline" icon="check" onClick={()=>{ lsSet(K.biz, business); showToast('Business details saved','success'); }}>Save Details</Button>
                                </div>

                                {!isStandalone && (
                                    <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5 flex items-center justify-between gap-3">
                                        <div><h2 className="font-serif text-lg font-bold text-forest">Install App</h2><p className="text-xs text-forest/60">{isIOS?'Safari: Share, then Add to Home Screen.':'Add to your home screen for app-like access.'}</p></div>
                                        <Button variant="gold" icon="smartphone" onClick={doInstall}>Install</Button>
                                    </div>
                                )}

                                <div className="bg-parch-card border-2 border-parch-dark rounded-3xl p-5 flex items-center justify-between gap-3">
                                    <div><h2 className="font-serif text-base font-bold text-red-800">Reset Device Data</h2><p className="text-xs text-forest/60">Clears local cache. Cloud data is untouched and reloads on next sync.</p></div>
                                    <Button variant="danger" icon="reset" onClick={()=>{ if(confirm('Clear data on this device?')){ localStorage.removeItem(K.customers); localStorage.removeItem(K.readings); setCustomers([]); setReadings([]); showToast('Local data cleared','info'); } }}>Reset</Button>
                                </div>

                                <p className="text-center text-[10px] font-extrabold uppercase tracking-[0.2em] text-forest/30 pt-2">Created by Dave Maher</p>
                            </div>
                        )}
                    </main>

                    {/* ===== ADD / EDIT CUSTOMER ===== */}
                    <Modal isOpen={mAdd} onClose={()=>setMAdd(false)} title="Add Customer" subtitle="A tenant or unit you recharge" size="large">
                        <form onSubmit={saveAdd} className="space-y-5">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                <Field label="Name / Unit"><input required className={inputCls} placeholder="e.g. Unit 3" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></Field>
                                <Field label="Billed Company"><input className={inputCls} placeholder="Tenant Ltd" value={form.billedEntity} onChange={e=>setForm({...form,billedEntity:e.target.value})} /></Field>
                                <Field label="Site / Building" hint="groups tenants on one master bill"><input className={inputCls} placeholder="e.g. Patrick St Block" value={form.site} onChange={e=>setForm({...form,site:e.target.value})} /></Field>
                                <Field label="Account Start Date" hint="existing customer? use their last reading date"><input type="date" className={inputCls} value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})} /></Field>
                                <Field label="Address"><input className={inputCls} value={form.address} onChange={e=>setForm({...form,address:e.target.value})} /></Field>
                                <Field label="Email"><input type="email" className={inputCls} value={form.email} onChange={e=>setForm({...form,email:e.target.value})} /></Field>
                            </div>
                            <div><h4 className="text-xs font-extrabold uppercase tracking-widest text-forest/60 border-b-2 border-parch-dark pb-2 mb-3">Utilities &amp; Irish Rates</h4>
                                <UtilityEditor utilities={form.utilities} setUtilities={u=>setForm({...form,utilities:u})} showInitial={true} /></div>
                            <Button type="submit" className="w-full py-4" icon="check">Add Customer</Button>
                        </form>
                    </Modal>

                    <Modal isOpen={mEdit} onClose={()=>setMEdit(false)} title="Edit Customer" subtitle={sel?sel.name:''} size="large">
                        <form onSubmit={saveEdit} className="space-y-5">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                <Field label="Name / Unit"><input required className={inputCls} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} /></Field>
                                <Field label="Billed Company"><input className={inputCls} value={form.billedEntity} onChange={e=>setForm({...form,billedEntity:e.target.value})} /></Field>
                                <Field label="Site / Building"><input className={inputCls} value={form.site} onChange={e=>setForm({...form,site:e.target.value})} /></Field>
                                <Field label="Account Start Date" hint="existing customer? use their last reading date"><input type="date" className={inputCls} value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})} /></Field>
                                <Field label="Address"><input className={inputCls} value={form.address} onChange={e=>setForm({...form,address:e.target.value})} /></Field>
                                <Field label="Email"><input type="email" className={inputCls} value={form.email} onChange={e=>setForm({...form,email:e.target.value})} /></Field>
                            </div>
                            <p className="text-[11px] text-forest/50 bg-gold/10 border border-gold/30 rounded-xl p-3">Changing a rate here applies to the next bill only. Past invoices keep the rate that applied when they were created.</p>
                            <div><h4 className="text-xs font-extrabold uppercase tracking-widest text-forest/60 border-b-2 border-parch-dark pb-2 mb-3">Utilities &amp; Irish Rates</h4>
                                <UtilityEditor utilities={form.utilities} setUtilities={u=>setForm({...form,utilities:u})} showInitial={false} /></div>
                            <div className="flex flex-col sm:flex-row gap-3 pt-3 border-t-2 border-parch-dark">
                                <Button type="button" variant="danger" icon="trash" onClick={()=>setMDel(true)}>Delete</Button>
                                <Button type="submit" className="flex-1 py-3.5" icon="check">Save Changes</Button>
                            </div>
                        </form>
                    </Modal>

                    <Modal isOpen={mDel} onClose={()=>setMDel(false)} title="Confirm Deletion" size="small">
                        <div className="text-center space-y-5">
                            <Icon name="alert" size={44} className="text-red-700 mx-auto" />
                            <p className="text-forest/70 text-sm">Delete <b>{sel&&sel.name}</b> and all its readings and invoices? This cannot be undone.</p>
                            <div className="flex gap-3"><Button variant="outline" className="flex-1" onClick={()=>setMDel(false)}>Cancel</Button><Button variant="danger" icon="trash" className="flex-1" onClick={doDelete}>Delete</Button></div>
                        </div>
                    </Modal>

                    {/* ===== LOG READING (with live bill preview) ===== */}
                    <Modal isOpen={mRead} onClose={()=>{ setMRead(false); setEditingReadingId(null); }} title={editingReadingId?"Edit Bill":"Log Meter Reading"} subtitle={sel&&selUtil?`${sel.name} - ${UTILS[selUtil].label}`:''}>
                        {selUtil && rateOverride && (
                            <form onSubmit={saveReading} className="space-y-4">
                                <div className="bg-parch border-2 border-parch-dark rounded-2xl p-4 text-center">
                                    <p className="text-[10px] font-extrabold uppercase tracking-widest text-forest/50">Previous Reading</p>
                                    <p className="font-mono text-2xl font-black text-forest tnum">{(prevReading?prevReading.reading:0).toFixed(2)}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <Field label="Period From" hint="last reading date"><input type="date" className={inputCls+" text-center text-sm"} value={readFrom} onChange={e=>setReadFrom(e.target.value)} /></Field>
                                    <Field label="Reading Date (To)"><input type="date" className={inputCls+" text-center text-sm"} value={readDate} onChange={e=>setReadDate(e.target.value)} /></Field>
                                </div>
                                {livePreview && livePreview.days===0 && (
                                    <p className="text-[12px] font-semibold text-gold-dark bg-gold/10 border border-gold/40 rounded-xl p-3 flex items-center gap-2"><Icon name="alert" size={15} />Period is 0 days, so the standing charge and PSO will be zero. Set "Period From" to the previous reading date.</p>
                                )}
                                <Field label="Current Reading">
                                    <input required type="number" step="0.001" autoFocus className="w-full p-4 text-4xl font-black text-center border-2 border-parch-dark rounded-2xl focus:border-gold outline-none font-mono tnum" placeholder="0.000" value={readVal} onChange={e=>setReadVal(e.target.value)} />
                                </Field>

                                {/* editable rates for mid-period price change */}
                                <details className="bg-parch rounded-2xl border-2 border-parch-dark">
                                    <summary className="px-4 py-3 cursor-pointer text-xs font-extrabold uppercase tracking-wider text-forest/60 flex items-center gap-2"><Icon name="pencil" size={14} />Adjust rates for this bill</summary>
                                    <div className="px-4 pb-4 grid grid-cols-2 gap-2">
                                        <Field label={selUtil==='gas'?'Rate \u20ac/kWh':'Unit Rate'}><input type="number" step="0.0001" className={inputCls+" text-sm"} value={rateOverride.unitRate} onChange={e=>setRateOverride({...rateOverride,unitRate:e.target.value})} /></Field>
                                        <Field label="Standing \u20ac/day"><input type="number" step="0.001" className={inputCls+" text-sm"} value={rateOverride.standingCharge} onChange={e=>setRateOverride({...rateOverride,standingCharge:e.target.value})} /></Field>
                                        {selUtil==='electricity' && <Field label="PSO \u20ac/day"><input type="number" step="0.0001" className={inputCls+" text-sm"} value={rateOverride.psoLevy} onChange={e=>setRateOverride({...rateOverride,psoLevy:e.target.value})} /></Field>}
                                        {selUtil==='water' && rateOverride.hasWastewater && <Field label="Wastewater \u20ac/m\u00b3"><input type="number" step="0.0001" className={inputCls+" text-sm"} value={rateOverride.wastewaterRate} onChange={e=>setRateOverride({...rateOverride,wastewaterRate:e.target.value})} /></Field>}
                                    </div>
                                </details>

                                {/* live preview */}
                                {livePreview && readVal!=='' && livePreview.usage>=0 && (
                                    <div className="bg-forest text-parch-card rounded-2xl p-4 animate-in">
                                        <div className="flex justify-between text-xs text-parch/60 font-bold uppercase tracking-wider mb-2"><span>Usage {livePreview.usage.toFixed(2)} {UTILS[selUtil].vol}</span><span>{livePreview.days} days</span></div>
                                        {livePreview.items.map((it,i)=>(<div key={i} className="flex justify-between text-sm py-0.5"><span className="text-parch/80">{it.label}</span><span className="font-bold tnum">{eur(it.amount)}</span></div>))}
                                        <div className="flex justify-between items-center pt-2 mt-2 border-t border-white/15"><span className="font-serif font-bold">Total Due</span><span className="font-serif text-2xl font-black text-gold-soft tnum">{eur(livePreview.total)}</span></div>
                                    </div>
                                )}
                                {livePreview && livePreview.usage<0 && <p className="text-red-700 text-sm font-semibold text-center">Reading is lower than the previous one.</p>}

                                <Button type="submit" className="w-full py-4" icon={editingReadingId?"check":"receipt"}>{editingReadingId?"Update Invoice":"Save & Create Invoice"}</Button>
                                {editingReadingId && (
                                    <button type="button" onClick={deleteReading} className="w-full py-2.5 text-red-700 font-bold text-sm flex items-center justify-center gap-2 hover:bg-red-50 rounded-xl transition-colors"><Icon name="trash" size={16} />Delete this bill</button>
                                )}
                            </form>
                        )}
                    </Modal>

                    {/* ===== INVOICE ===== */}
                    <Modal isOpen={mInv} onClose={()=>setMInv(false)} title="Invoice" subtitle={invoice?invoice.invoiceNo:''} size="large">
                        {invoice && (
                            <div className="space-y-4">
                                <div className="rounded-2xl overflow-hidden border-2 border-parch-dark shadow-lg"><Invoice data={invoice} business={business} /></div>
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                    <Button variant="primary" icon="download" onClick={printInvoice}>Print / PDF</Button>
                                    <Button variant="gold" icon="mail" disabled={emailing} onClick={emailToSelf}>{emailing?'Sending...':'Email Me'}</Button>
                                    <Button variant="outline" icon="pencil" onClick={()=>openEditReading(invoice)}>Edit</Button>
                                    <Button variant={invoice.paid?'success':'outline'} icon="check" onClick={togglePaid}>{invoice.paid?'Paid (undo)':'Mark Paid'}</Button>
                                </div>
                            </div>
                        )}
                    </Modal>

                    {/* ===== MOBILE BOTTOM NAV ===== */}
                    <nav className="fixed bottom-0 inset-x-0 bg-forest text-parch-card border-t-2 border-gold z-50 sm:hidden pb-safe">
                        <div className="flex justify-around items-center pt-2">
                            {NAV.map(t => (
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`flex flex-col items-center gap-0.5 px-2 py-1 ${tab===t.id?'text-gold-soft':'text-parch/50'}`}>
                                    <Icon name={t.icon} size={20} /><span className="text-[8px] font-bold uppercase tracking-wider">{t.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
