          reset:'<path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.36 2.64L3 8"/><path d="M3 3v5h5"/>',
          link:'<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
          smartphone:'<rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/>',
          eye:'<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>',
          archive:'<rect x="2" y="4" width="20" height="5" rx="1"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9M10 13h4"/>'
        };
        const Icon = ({ name, size=20, className='', stroke=2 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
                 className={className} style={{ flexShrink:0 }}
                 dangerouslySetInnerHTML={{ __html: ICONS[name] || '' }} />
        );

        /* ====================== UTILITY DEFINITIONS (Ireland) ====================== */
        const UTILS = {
            electricity:{ label:'Electricity', icon:'zap', refLabel:'MPRN', refKey:'mprn', vol:'kWh',
                defaults:{ enabled:true, mprn:'', meterNo:'', unitRate:0.35, standingCharge:0.60, psoLevy:0.0523, vatRate:9 } },
            water:{ label:'Water', icon:'droplet', refLabel:'WPRN', refKey:'wprn', vol:'m\u00b3',
                defaults:{ enabled:true, wprn:'', meterNo:'', unitRate:1.68, standingCharge:0.60,
                           hasWastewater:false, wastewaterRate:1.68, wastewaterStanding:0.30, returnPct:100, vatRate:0 } },
            gas:{ label:'Gas', icon:'flame', refLabel:'GPRN', refKey:'gprn', vol:'m\u00b3',
                defaults:{ enabled:false, gprn:'', meterNo:'', unitRate:0.11, standingCharge:0.30,
                           conversion:11.3636, hasCarbon:false, carbonRate:0.0091, vatRate:9 } },
            waste:{ label:'Waste', icon:'trash', refLabel:'Account', refKey:'account', vol:'lifts',
                defaults:{ enabled:false, account:'', meterNo:'', unitRate:6.00, standingCharge:0.0, vatRate:13.5 } }
        };
        const UKEYS = ['electricity','water','gas','waste'];
        const UCOLOR = { electricity:'#c9a24b', water:'#2e6b6b', gas:'#a6612e', waste:'#6b6658' };
        const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
        const num = x => { const n = parseFloat(x); return isNaN(n) ? 0 : n; };
        const eur = x => '\u20ac' + num(x).toFixed(2);
        const todayISO = () => new Date().toISOString().slice(0,10);
        const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '';
        const daysBetween = (a,b) => { if(!a||!b) return 0; const n = Math.round((new Date(b)-new Date(a))/86400000); return n<0?0:n; };

        const blankUtils = () => {
            const u = {};
            UKEYS.forEach(k => { u[k] = { ...UTILS[k].defaults, initialReading:'' }; });
            return u;
        };
        const blankCustomer = () => ({
            name:'', billedEntity:'', address:'', site:'', email:'', phone:'',
            startDate: todayISO(), utilities: blankUtils()
        });

        /* ====================== BILLING ENGINE ====================== */
        // Builds itemised line items for a single utility reading.
        // usage = current - previous (in the meter's native unit), days = period length.
        function computeBill(key, cfg, usage, days) {
            const items = [];
            const r = num;
            if (key === 'electricity') {
                if (r(cfg.standingCharge) > 0) items.push({ label:'Standing Charge', qty:days, unit:'days', rate:r(cfg.standingCharge), amount: days * r(cfg.standingCharge) });
                if (r(cfg.psoLevy) > 0)        items.push({ label:'PSO Levy', qty:days, unit:'days', rate:r(cfg.psoLevy), amount: days * r(cfg.psoLevy) });
                items.push({ label:'Electricity Supplied', qty:usage, unit:'kWh', rate:r(cfg.unitRate), amount: usage * r(cfg.unitRate) });
            } else if (key === 'water') {
                if (r(cfg.standingCharge) > 0) items.push({ label:'Water Standing Charge', qty:days, unit:'days', rate:r(cfg.standingCharge), amount: days * r(cfg.standingCharge) });
                items.push({ label:'Water Supplied', qty:usage, unit:'m\u00b3', rate:r(cfg.unitRate), amount: usage * r(cfg.unitRate) });
                if (cfg.hasWastewater) {
                    const wwVol = usage * (r(cfg.returnPct || 100) / 100);
                    if (r(cfg.wastewaterStanding) > 0) items.push({ label:'Wastewater Standing Charge', qty:days, unit:'days', rate:r(cfg.wastewaterStanding), amount: days * r(cfg.wastewaterStanding) });
                    items.push({ label:'Wastewater Removed', qty:wwVol, unit:'m\u00b3', rate:r(cfg.wastewaterRate), amount: wwVol * r(cfg.wastewaterRate),
                                 note: r(cfg.returnPct||100) !== 100 ? `${r(cfg.returnPct)}% return to sewer` : '' });
                }
            } else if (key === 'gas') {
                if (r(cfg.standingCharge) > 0) items.push({ label:'Standing Charge', qty:days, unit:'days', rate:r(cfg.standingCharge), amount: days * r(cfg.standingCharge) });
                const kwh = usage * r(cfg.conversion || 1);
                items.push({ label:'Gas Supplied', qty:kwh, unit:'kWh', rate:r(cfg.unitRate), amount: kwh * r(cfg.unitRate),
                             note:`${usage.toFixed(2)} m\u00b3 x ${r(cfg.conversion)} factor` });
                if (cfg.hasCarbon && r(cfg.carbonRate) > 0) items.push({ label:'Carbon Tax', qty:kwh, unit:'kWh', rate:r(cfg.carbonRate), amount: kwh * r(cfg.carbonRate) });
            } else if (key === 'waste') {
                if (r(cfg.standingCharge) > 0) items.push({ label:'Service Charge', qty:days, unit:'days', rate:r(cfg.standingCharge), amount: days * r(cfg.standingCharge) });
                items.push({ label:'Collections', qty:usage, unit:'lifts', rate:r(cfg.unitRate), amount: usage * r(cfg.unitRate) });
            }
            const subtotal = items.reduce((a,i) => a + i.amount, 0);
            const vatRate = r(cfg.vatRate);
            const vatAmount = subtotal * vatRate / 100;
            return { items, subtotal, vatRate, vatAmount, total: subtotal + vatAmount };
        }

        /* ====================== SMALL UI PRIMITIVES ====================== */
        const Button = ({ children, variant='primary', icon, onClick, disabled, type='button', className='' }) => {
            const v = {
                primary:'bg-forest text-parch-card hover:bg-forest-light shadow-md shadow-forest/20',
                gold:'bg-gold text-white hover:bg-gold-dark shadow-md shadow-gold/20',
                outline:'bg-transparent text-forest border-2 border-forest/30 hover:border-forest hover:bg-forest/5',
                ghost:'text-forest/70 hover:bg-forest/10',
                danger:'bg-red-700 text-white hover:bg-red-800 shadow-md',
                success:'bg-emerald-700 text-white hover:bg-emerald-800 shadow-md'
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled}
                    className={`px-5 py-3 rounded-xl font-bold tracking-wide transition-all flex items-center justify-center gap-2 active:scale-95 disabled:opacity-50 ${v[variant]} ${className}`}>
                    {icon && <Icon name={icon} size={18} />}{children}
                </button>
            );
        };
        const Field = ({ label, hint, children }) => (
            <div className="space-y-1.5">
                {label && <label className="text-[10px] font-extrabold text-forest/60 uppercase tracking-[0.12em] ml-0.5 flex items-center gap-2">{label}{hint && <span className="text-gold-dark font-semibold normal-case tracking-normal text-[10px]">{hint}</span>}</label>}
                {children}
            </div>
        );
        const inputCls = "w-full p-3 bg-white border-2 border-parch-dark rounded-xl focus:border-gold outline-none font-semibold text-ink transition-colors";
        const Toggle = ({ checked, onChange }) => (
            <button type="button" onClick={() => onChange(!checked)}
                className={`w-12 h-7 rounded-full transition-colors relative shrink-0 ${checked ? 'bg-forest' : 'bg-parch-dark'}`}>
                <span className={`absolute top-1 w-5 h-5 bg-white rounded-full shadow transition-all ${checked ? 'left-6' : 'left-1'}`}></span>
            </button>
        );
        const Modal = ({ isOpen, onClose, title, subtitle, children, size='default' }) => {
            if (!isOpen) return null;
            const sizes = { default:'max-w-2xl', large:'max-w-4xl', small:'max-w-md' };
            return (
                <div className="fixed inset-0 z-[80] flex items-end sm:items-center justify-center sm:p-4">
                    <div className="absolute inset-0 bg-forest-dark/70 backdrop-blur-sm" onClick={onClose}></div>
                    <div className={`relative bg-parch-card sm:rounded-3xl rounded-t-3xl shadow-2xl w-full ${sizes[size]} max-h-[92vh] flex flex-col animate-in`}>
                        <div className="shrink-0 bg-forest p-5 flex justify-between items-center text-parch-card sm:rounded-t-3xl rounded-t-3xl border-b-4 border-gold">
                            <div className="min-w-0">
                                <h2 className="text-xl font-serif font-bold tracking-tight truncate">{title}</h2>
                                {subtitle && <p className="text-parch/60 text-xs font-semibold mt-0.5 truncate">{subtitle}</p>}
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-white/15 rounded-xl transition-all shrink-0"><Icon name="x" size={22} /></button>
                        </div>
                        <div className="p-5 sm:p-6 flex-1 overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        /* ====================== UTILITY CONFIG EDITOR ====================== */
        function UtilityEditor({ utilities, setUtilities, showInitial }) {
            const set = (k, field, val) => setUtilities({ ...utilities, [k]: { ...utilities[k], [field]: val } });
            return (
                <div className="space-y-3">
                    {UKEYS.map(k => {
                        const meta = UTILS[k]; const cfg = utilities[k];
                        return (
                            <div key={k} className={`rounded-2xl border-2 transition-all ${cfg.enabled ? 'border-forest/25 bg-parch' : 'border-parch-dark bg-parch/40'}`}>
                                <div className="flex items-center justify-between p-3.5">
                                    <div className="flex items-center gap-3">
                                        <div className={`p-2 rounded-xl ${cfg.enabled ? 'bg-forest text-gold-soft' : 'bg-parch-dark text-forest/40'}`}><Icon name={meta.icon} size={18} /></div>
                                        <span className="font-bold uppercase tracking-wider text-sm text-forest">{meta.label}</span>
                                    </div>
                                    <Toggle checked={!!cfg.enabled} onChange={v => set(k,'enabled',v)} />
                                </div>
                                {cfg.enabled && (
                                    <div className="px-3.5 pb-4 space-y-3 animate-in">
                                        <div className="grid grid-cols-2 gap-2">
                                            <input className={inputCls+" text-sm"} placeholder="Meter No." value={cfg.meterNo} onChange={e=>set(k,'meterNo',e.target.value)} />
                                            <input className={inputCls+" text-sm"} placeholder={meta.refLabel} value={cfg[meta.refKey]||''} onChange={e=>set(k,meta.refKey,e.target.value)} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <Field label={k==='gas'?'Rate \u20ac/kWh':(k==='waste'?'Rate \u20ac/lift':'Unit Rate \u20ac/'+meta.vol)}>
                                                <input type="number" step="0.0001" className={inputCls+" text-sm"} value={cfg.unitRate} onChange={e=>set(k,'unitRate',e.target.value)} />
                                            </Field>
                                            <Field label={k==='waste'?'Service \u20ac/day':'Standing \u20ac/day'}>
                                                <input type="number" step="0.001" className={inputCls+" text-sm"} value={cfg.standingCharge} onChange={e=>set(k,'standingCharge',e.target.value)} />
                                            </Field>
                                        </div>

                                        {k==='electricity' && (
                                            <Field label="PSO Levy \u20ac/day" hint="approx annual / 365">
                                                <input type="number" step="0.0001" className={inputCls+" text-sm"} value={cfg.psoLevy} onChange={e=>set(k,'psoLevy',e.target.value)} />
                                            </Field>
                                        )}

                                        {k==='gas' && (
                                            <div className="grid grid-cols-2 gap-2">
                                                <Field label="m\u00b3 to kWh factor"><input type="number" step="0.0001" className={inputCls+" text-sm"} value={cfg.conversion} onChange={e=>set(k,'conversion',e.target.value)} /></Field>
                                                <Field label="Carbon \u20ac/kWh">
                                                    <div className="flex gap-2 items-center">
                                                        <Toggle checked={!!cfg.hasCarbon} onChange={v=>set(k,'hasCarbon',v)} />
                                                        <input type="number" step="0.0001" disabled={!cfg.hasCarbon} className={inputCls+" text-sm disabled:opacity-40"} value={cfg.carbonRate} onChange={e=>set(k,'carbonRate',e.target.value)} />
                                                    </div>
                                                </Field>
                                            </div>
                                        )}

                                        {k==='water' && (
                                            <div className="rounded-xl bg-white border-2 border-parch-dark p-3 space-y-3">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-[11px] font-extrabold uppercase tracking-wider text-forest/70">Wastewater (charged on volume removed)</span>
                                                    <Toggle checked={!!cfg.hasWastewater} onChange={v=>set(k,'hasWastewater',v)} />
                                                </div>
                                                {cfg.hasWastewater && (
                                                    <div className="grid grid-cols-2 gap-2 animate-in">
                                                        <Field label="Wastewater \u20ac/m\u00b3"><input type="number" step="0.0001" className={inputCls+" text-sm"} value={cfg.wastewaterRate} onChange={e=>set(k,'wastewaterRate',e.target.value)} /></Field>
                                                        <Field label="WW Standing \u20ac/day"><input type="number" step="0.001" className={inputCls+" text-sm"} value={cfg.wastewaterStanding} onChange={e=>set(k,'wastewaterStanding',e.target.value)} /></Field>
                                                        <Field label="Return to sewer %" hint="usually 100"><input type="number" step="1" className={inputCls+" text-sm"} value={cfg.returnPct} onChange={e=>set(k,'returnPct',e.target.value)} /></Field>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <Field label={'VAT % ' + (k==='water'?'(water is usually exempt)':'')}>
                                            <input type="number" step="0.1" className={inputCls+" text-sm"} value={cfg.vatRate} onChange={e=>set(k,'vatRate',e.target.value)} />
                                        </Field>

                                        {showInitial && (
                                            <Field label="Opening Meter Reading" hint="their last reading - the start point, not billed">
                                                <input type="number" step="0.001" className={inputCls+" text-sm bg-gold/10 border-gold/40"} placeholder="0.000" value={cfg.initialReading} onChange={e=>set(k,'initialReading',e.target.value)} />
                                            </Field>
                                        )}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

        /* ====================== ERROR BOUNDARY (no white screen ever) ====================== */
        class ErrorBoundary extends React.Component {
            constructor(p){ super(p); this.state={ err:null }; }
            static getDerivedStateFromError(err){ return { err }; }
            render(){
                if (this.state.err) {
                    return (
                        <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                            <Icon name="alert" size={48} className="text-gold mb-4" />
                            <h1 className="font-serif text-2xl font-bold text-forest mb-2">Something went wrong</h1>
                            <p className="text-forest/70 text-sm mb-6 max-w-sm">The app hit an unexpected error. Your data is safe in this device. Try reloading.</p>
                            <div className="flex gap-3">
                                <Button onClick={()=>location.reload()} icon="reset">Reload</Button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        /* ====================== INVOICE PREVIEW ====================== */
        function Invoice({ data, business }) {
            const c = data.customer;

                            <img src={LOGO} alt="" style={{ width:64, height:64 }} className="shrink-0" />
                            <div className="min-w-0">
                                <h1 className="font-serif text-2xl font-black text-forest leading-tight truncate">{business.name}</h1>
                                <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-gold-dark">Tradition &middot; Integrity &middot; Service</p>

                            </div>

                            <p className="text-[9px] font-extrabold uppercase tracking-[0.18em] text-forest/50">Invoice</p>

                                {c.billedEntity && c.name && c.name!==c.billedEntity && <p className="text-sm text-forest/70">{c.name}</p>}
                                <p className="text-sm text-forest/70 max-w-[240px]">{c.address}</p>

                                {refVal && <p className="text-xs text-forest/70 mt-0.5">{refLabel}: <span className="font-semibold">{refVal}</span></p>}
                                <p className="text-xs text-forest/70 mt-0.5">VAT Rate: {data.vatRate}%{data.vatRate===0 && ' (Exempt)'}</p>

                        {/* Meter box */}
